<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Fútbol</title>
    <style>
        /* Estilos basados en tu imagen (Fondo oscuro y detalles en verde brillante) */
        :root {
            --bg-color: #111625;
            --card-bg: #1e2538;
            --text-color: #ffffff;
            --accent-color: #00e676;
            --accent-hover: #00b359;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .cart-icon-container {
            cursor: pointer;
            position: relative;
            background: var(--accent-color);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-top: 40px;
            font-size: 28px;
        }

        /* Grid de Productos */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .product-title {
            font-size: 18px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .product-desc {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .product-price {
            font-size: 18px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-add {
            background-color: var(--accent-color);
            color: #111;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
        }

        /* Ventana Modal del Carrito */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 80%;
            overflow-y: auto;
            border: 1px solid var(--accent-color);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .close-cart {
            cursor: pointer;
            font-size: 24px;
            color: #fff;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .btn-remove {
            background: #ff4d4d;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        .cart-total {
            margin-top: 20px;
            font-size: 20px;
            text-align: right;
            font-weight: bold;
            color: var(--accent-color);
        }

        .btn-checkout {
            display: block;
            width: 100%;
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
